<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danish — Digital Twin</title>
    <meta name="description" content="Have a real-time voice conversation with Danish's AI digital twin.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%237c6aef'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #08090d;
            --surface: rgba(255, 255, 255, 0.025);
            --border: rgba(255, 255, 255, 0.06);
            --accent: #7c6aef;
            --accent-glow: rgba(124, 106, 239, 0.25);
            --teal: #4ecdc4;
            --teal-glow: rgba(78, 205, 196, 0.25);
            --text: #f0f0f5;
            --text-secondary: #7a7c8e;
            --text-muted: #3d3f52;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle background gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(124, 106, 239, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 100%, rgba(78, 205, 196, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            min-height: 100dvh;
            justify-content: center;
        }

        /* ── Header ── */
        .header { text-align: center; }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 0.3rem;
        }

        .header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* ── Orb ── */
        .orb-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 32% 32%, #9182f3, #6355c0, #3f2e94);
            box-shadow: 0 0 50px var(--accent-glow), inset 0 -8px 24px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
            transition: background 0.6s ease, box-shadow 0.6s ease;
        }

        /* Highlight dot on the orb */
        .orb::after {
            content: '';
            position: absolute;
            top: 22%;
            left: 28%;
            width: 18%;
            height: 18%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            filter: blur(6px);
        }

        .orb.idle { animation: idlePulse 5s ease-in-out infinite; }

        .orb.speaking {
            animation: speakPulse 1.1s ease-in-out infinite;
            box-shadow: 0 0 70px rgba(124, 106, 239, 0.45), 0 0 120px rgba(124, 106, 239, 0.15),
                        inset 0 -8px 24px rgba(0,0,0,0.3);
        }

        .orb.listening {
            background: radial-gradient(circle at 32% 32%, #65e0d8, #3bb8b0, #248a84);
            box-shadow: 0 0 50px var(--teal-glow), inset 0 -8px 24px rgba(0,0,0,0.3);
            animation: listenPulse 2s ease-in-out infinite;
        }

        /* Expanding rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(124, 106, 239, 0.12);
            width: 140px;
            height: 140px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
        }

        .orb-wrapper.active .ring { animation: ringExpand 3s ease-out infinite; }
        .orb-wrapper.active .ring:nth-child(3) { animation-delay: 0.6s; }
        .orb-wrapper.active .ring:nth-child(4) { animation-delay: 1.2s; }
        .orb-wrapper.active .ring:nth-child(5) { animation-delay: 1.8s; }

        @keyframes idlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.015); }
        }
        @keyframes speakPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.055); }
        }
        @keyframes listenPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.025); }
        }
        @keyframes ringExpand {
            0%   { width: 140px; height: 140px; opacity: 0.35; }
            100% { width: 300px; height: 300px; opacity: 0; }
        }

        /* ── Status ── */
        .status-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-height: 1.2rem;
        }

        .status-row.connected { color: var(--teal); }
        .status-row.error { color: var(--danger); }

        .timer {
            font-variant-numeric: tabular-nums;
            opacity: 0.7;
        }

        /* ── Transcript ── */
        .transcript {
            width: 100%;
            max-height: 260px;
            min-height: 100px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            padding: 1.1rem 1.2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
        }

        .transcript::-webkit-scrollbar { width: 4px; }
        .transcript::-webkit-scrollbar-track { background: transparent; }
        .transcript::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        .transcript-empty {
            color: var(--text-muted);
            font-size: 0.82rem;
            text-align: center;
            margin: auto;
            user-select: none;
        }

        .msg {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            animation: msgIn 0.25s ease-out;
        }

        .msg-speaker {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .msg-speaker.agent { color: var(--accent); }
        .msg-speaker.user  { color: var(--teal); }

        .msg-text {
            font-size: 0.88rem;
            line-height: 1.55;
            color: var(--text);
        }

        .msg-text.interim { color: var(--text-secondary); }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Button ── */
        .btn {
            padding: 0.85rem 2.2rem;
            border-radius: 100px;
            border: none;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 210px;
            user-select: none;
        }

        .btn-start {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 28px var(--accent-glow);
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 36px rgba(124, 106, 239, 0.4);
        }

        .btn-stop {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-stop:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.09);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ── Footer ── */
        .footer {
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .container { padding: 2rem 1.25rem; gap: 1.5rem; }
            .orb-wrapper { width: 170px; height: 170px; }
            .orb { width: 120px; height: 120px; }
            .header h1 { font-size: 1.5rem; }
            .transcript { max-height: 200px; min-height: 80px; }
            @keyframes ringExpand {
                0%   { width: 120px; height: 120px; opacity: 0.35; }
                100% { width: 250px; height: 250px; opacity: 0; }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Danish</h1>
            <p>AI Engineer &mdash; ask me anything, for real</p>
        </div>

        <div class="orb-wrapper" id="orbWrapper">
            <div class="orb idle" id="orb"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <div class="status-row" id="statusRow">
            <span id="status">Click below to start a conversation</span>
            <span class="timer" id="timer"></span>
        </div>

        <div class="transcript" id="transcript">
            <span class="transcript-empty" id="placeholder">Conversation will appear here&hellip;</span>
        </div>

        <button class="btn btn-start" id="actionBtn">Start Conversation</button>

        <div class="footer">Digital Twin Experience</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
    <script>
        /* ── LiveKit SDK references ── */
        const { Room, RoomEvent, Track } = LivekitClient;

        /* ── State ── */
        let room = null;
        let connected = false;
        let timerHandle = null;
        let startTime = null;
        let inactivityHandle = null;
        let warningHandle = null;
        const INACTIVITY_WARNING = 30_000;  // warn at 30s
        const INACTIVITY_TIMEOUT = 45_000;  // disconnect at 45s
        const segmentTexts = new Map(); // segId → text (for merging)
        let lastSpeaker = null;
        let lastTextEl = null;
        let agentJoined = false;
        let idleDebounce = null;
        const IDLE_DEBOUNCE_MS = 1500; // wait before showing idle after speech stops

        /* ── DOM ── */
        const orbEl       = document.getElementById('orb');
        const orbWrapper  = document.getElementById('orbWrapper');
        const statusRow   = document.getElementById('statusRow');
        const statusEl    = document.getElementById('status');
        const timerEl     = document.getElementById('timer');
        const transcriptEl= document.getElementById('transcript');
        const placeholder = document.getElementById('placeholder');
        const actionBtn   = document.getElementById('actionBtn');

        actionBtn.addEventListener('click', handleAction);

        /* ── Helpers ── */
        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusRow.className = 'status-row' + (cls ? ` ${cls}` : '');
        }

        function setOrb(state) {
            orbEl.className = 'orb ' + state;
            orbWrapper.classList.toggle('active', state === 'speaking');
        }

        function startTimer() {
            startTime = Date.now();
            timerHandle = setInterval(() => {
                const s = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(s / 60);
                timerEl.textContent = `${m}:${String(s % 60).padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerHandle);
            timerEl.textContent = '';
        }

        function resetInactivity() {
            clearTimeout(inactivityHandle);
            clearTimeout(warningHandle);
            if (connected) {
                warningHandle = setTimeout(() => {
                    setStatus('Still there? Disconnecting soon\u2026', 'error');
                }, INACTIVITY_WARNING);
                inactivityHandle = setTimeout(() => {
                    setStatus('Disconnected \u2014 no activity', '');
                    disconnect();
                }, INACTIVITY_TIMEOUT);
            }
        }

        function addOrUpdateSegment(segId, speaker, text, isFinal) {
            // If speaker changed, start a new bubble and clear segment map
            if (speaker !== lastSpeaker) {
                if (placeholder) placeholder.remove();
                const el = document.createElement('div');
                el.className = 'msg';
                el.innerHTML =
                    `<span class="msg-speaker ${speaker === 'Danish' ? 'agent' : 'user'}">${speaker}</span>` +
                    `<span class="msg-text"></span>`;
                transcriptEl.appendChild(el);
                lastTextEl = el.querySelector('.msg-text');
                lastSpeaker = speaker;
                segmentTexts.clear();
            }

            // Store/update this segment's text
            segmentTexts.set(segId, text);

            // Rebuild the full turn from all segments
            const fullText = Array.from(segmentTexts.values()).join(' ');
            lastTextEl.textContent = fullText;
            lastTextEl.classList.toggle('interim', !isFinal);

            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        /* ── Connect / Disconnect ── */
        async function connect() {
            actionBtn.disabled = true;
            setStatus('Connecting\u2026');
            setOrb('idle');

            try {
                const res = await fetch('/api/token', { method: 'POST' });
                if (!res.ok) throw new Error(`Server error ${res.status}`);
                const { token, url } = await res.json();

                room = new Room({
                    audioCaptureDefaults: { autoGainControl: true, noiseSuppression: true, echoCancellation: true },
                });

                /* Subscribe to agent audio */
                room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
                    if (track.kind === Track.Kind.Audio) {
                        const el = track.attach();
                        el.id = 'agent-audio';
                        el.style.display = 'none';
                        document.body.appendChild(el);
                    }
                });

                room.on(RoomEvent.TrackUnsubscribed, (track) => {
                    track.detach().forEach(el => el.remove());
                });

                /* Detect when agent joins the room */
                room.on(RoomEvent.ParticipantConnected, (participant) => {
                    if (participant.identity !== room.localParticipant.identity) {
                        agentJoined = true;
                        setStatus('Connected \u2014 say something', 'connected');
                    }
                });

                /* Visual feedback for speaking / listening */
                room.on(RoomEvent.ActiveSpeakersChanged, (speakers) => {
                    if (!connected) return;
                    const agentSpeaking = speakers.some(p => p.identity !== room.localParticipant.identity);
                    const userSpeaking  = speakers.some(p => p.identity === room.localParticipant.identity);
                    if (agentSpeaking || userSpeaking) {
                        resetInactivity();
                        clearTimeout(idleDebounce);
                        idleDebounce = null;
                    }
                    if (agentSpeaking) {
                        setOrb('speaking');
                        setStatus('Danish is speaking\u2026', 'connected');
                    } else if (userSpeaking) {
                        setOrb('listening');
                        setStatus('Listening\u2026', 'connected');
                    } else if (!idleDebounce) {
                        // Debounce: wait before switching to idle so brief pauses don't flicker
                        idleDebounce = setTimeout(() => {
                            idleDebounce = null;
                            if (connected) {
                                setOrb('idle');
                                setStatus('Connected \u2014 say something', 'connected');
                            }
                        }, IDLE_DEBOUNCE_MS);
                    }
                });

                /* Live transcriptions */
                room.on(RoomEvent.TranscriptionReceived, (segs, participant) => {
                    for (const seg of segs) {
                        const isAgent = !participant || participant.identity !== room.localParticipant.identity;
                        addOrUpdateSegment(seg.id, isAgent ? 'Danish' : 'You', seg.text, seg.final);
                    }
                });

                room.on(RoomEvent.Disconnected, () => onDisconnected());

                await room.connect(url, token);
                await room.localParticipant.setMicrophoneEnabled(true);

                connected = true;
                agentJoined = room.remoteParticipants.size > 0;
                setStatus(agentJoined ? 'Connected \u2014 say something' : 'Waiting for Danish\u2026', 'connected');
                setOrb('idle');
                startTimer();
                resetInactivity();

                actionBtn.disabled = false;
                actionBtn.className = 'btn btn-stop';
                actionBtn.textContent = 'End Conversation';

            } catch (err) {
                console.error(err);
                const msg = err.name === 'NotAllowedError'
                    ? 'Microphone access denied \u2014 please allow and retry'
                    : 'Connection failed \u2014 please try again';
                setStatus(msg, 'error');
                setOrb('idle');
                actionBtn.disabled = false;
            }
        }

        async function disconnect() {
            if (room) await room.disconnect();
            onDisconnected();
        }

        function onDisconnected() {
            connected = false;
            room = null;
            stopTimer();
            clearTimeout(inactivityHandle);
            clearTimeout(warningHandle);
            clearTimeout(idleDebounce);
            idleDebounce = null;
            setOrb('idle');
            setStatus('Conversation ended');
            actionBtn.className = 'btn btn-start';
            actionBtn.textContent = 'Start New Conversation';
            actionBtn.disabled = false;

            const audio = document.getElementById('agent-audio');
            if (audio) audio.remove();
        }

        function handleAction() {
            if (connected) {
                disconnect();
            } else {
                transcriptEl.innerHTML = '';
                segmentTexts.clear();
                lastSpeaker = null;
                lastTextEl = null;
                agentJoined = false;
                connect();
            }
        }
    </script>
</body>
</html>
